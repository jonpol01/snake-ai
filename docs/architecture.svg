<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#888" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0a8" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#48f" stroke-width="1.2"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="8" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#0f8" font-size="16" font-weight="bold" filter="url(#glow)">SNAKE AI  --  SYSTEM ARCHITECTURE</text>
  <line x1="200" y1="42" x2="700" y2="42" stroke="#0f8" stroke-width="0.5" opacity="0.3"/>

  <!-- ==================== MAIN THREAD BOX ==================== -->
  <rect x="20" y="60" width="250" height="200" rx="6" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="30" y="78" fill="#666" font-size="9" letter-spacing="2">MAIN THREAD</text>

  <!-- egui GUI -->
  <rect x="40" y="92" width="210" height="80" rx="5" fill="#1a1a1a" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="145" y="112" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">egui Native GUI</text>
  <text x="145" y="130" text-anchor="middle" fill="#777" font-size="10">Controls / Logs / Stats</text>
  <text x="145" y="146" text-anchor="middle" fill="#777" font-size="10">Speed Slider / Settings</text>
  <rect x="45" y="156" width="58" height="12" rx="2" fill="#a78bfa" opacity="0.15"/>
  <text x="74" y="165" text-anchor="middle" fill="#a78bfa" font-size="8">START</text>
  <rect x="110" y="156" width="58" height="12" rx="2" fill="#a78bfa" opacity="0.15"/>
  <text x="139" y="165" text-anchor="middle" fill="#a78bfa" font-size="8">PAUSE</text>
  <rect x="175" y="156" width="58" height="12" rx="2" fill="#a78bfa" opacity="0.15"/>
  <text x="204" y="165" text-anchor="middle" fill="#a78bfa" font-size="8">RESUME</text>

  <!-- SharedState -->
  <rect x="55" y="192" width="180" height="50" rx="5" fill="#1a1a1a" stroke="#f80" stroke-width="1.2"/>
  <text x="145" y="212" text-anchor="middle" fill="#f80" font-size="11" font-weight="bold">SharedState</text>
  <text x="145" y="228" text-anchor="middle" fill="#777" font-size="9">Arc&lt;Mutex&lt;..&gt;&gt;</text>

  <!-- ==================== TOKIO RUNTIME BOX ==================== -->
  <rect x="300" y="60" width="580" height="380" rx="6" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="310" y="78" fill="#666" font-size="9" letter-spacing="2">TOKIO RUNTIME (BACKGROUND THREAD)</text>

  <!-- Simulation Loop -->
  <rect x="320" y="92" width="240" height="210" rx="5" fill="#1a1a1a" stroke="#0f8" stroke-width="1.2"/>
  <text x="440" y="112" text-anchor="middle" fill="#0f8" font-size="13" font-weight="bold">Simulation Loop</text>
  <text x="440" y="130" text-anchor="middle" fill="#888" font-size="10">33ms tick interval</text>

  <!-- Steps inside sim loop -->
  <rect x="335" y="140" width="210" height="22" rx="3" fill="#0f8" opacity="0.08"/>
  <text x="340" y="155" fill="#0f8" font-size="10">1. look_all() -- 8-dir raycast</text>

  <rect x="335" y="168" width="210" height="22" rx="3" fill="#48f" opacity="0.08"/>
  <text x="340" y="183" fill="#48f" font-size="10">2. GPU forward pass (2000x)</text>

  <rect x="335" y="196" width="210" height="22" rx="3" fill="#0f8" opacity="0.08"/>
  <text x="340" y="211" fill="#0f8" font-size="10">3. move_all() -- apply moves</text>

  <rect x="335" y="224" width="210" height="22" rx="3" fill="#f80" opacity="0.08"/>
  <text x="340" y="239" fill="#f80" font-size="10">4. fitness + selection</text>

  <rect x="335" y="252" width="210" height="22" rx="3" fill="#888" opacity="0.08"/>
  <text x="340" y="267" fill="#888" font-size="10">5. checkpoint (every 10 gen)</text>

  <text x="440" y="294" text-anchor="middle" fill="#555" font-size="9">speed: 1-200 steps/frame</text>

  <!-- GPU Compute -->
  <rect x="600" y="92" width="260" height="130" rx="5" fill="#1a1a1a" stroke="#48f" stroke-width="1.2"/>
  <text x="730" y="112" text-anchor="middle" fill="#48f" font-size="13" font-weight="bold">wgpu Compute Shader</text>
  <text x="730" y="130" text-anchor="middle" fill="#888" font-size="10">Metal (Mac) / Vulkan (Linux)</text>

  <!-- GPU buffers -->
  <rect x="615" y="140" width="70" height="30" rx="3" fill="#48f" opacity="0.12" stroke="#48f" stroke-width="0.5"/>
  <text x="650" y="153" text-anchor="middle" fill="#48f" font-size="8">weights</text>
  <text x="650" y="164" text-anchor="middle" fill="#555" font-size="7">2000x740</text>

  <rect x="695" y="140" width="70" height="30" rx="3" fill="#48f" opacity="0.12" stroke="#48f" stroke-width="0.5"/>
  <text x="730" y="153" text-anchor="middle" fill="#48f" font-size="8">inputs</text>
  <text x="730" y="164" text-anchor="middle" fill="#555" font-size="7">2000x24</text>

  <rect x="775" y="140" width="70" height="30" rx="3" fill="#48f" opacity="0.12" stroke="#48f" stroke-width="0.5"/>
  <text x="810" y="153" text-anchor="middle" fill="#48f" font-size="8">outputs</text>
  <text x="810" y="164" text-anchor="middle" fill="#555" font-size="7">2000x4</text>

  <text x="730" y="192" text-anchor="middle" fill="#888" font-size="9">64 threads/workgroup</text>
  <text x="730" y="206" text-anchor="middle" fill="#888" font-size="9">32 workgroups dispatched</text>
  <text x="730" y="220" text-anchor="middle" fill="#48f" font-size="9">&lt;0.5ms on Apple Silicon</text>

  <!-- CPU Fallback note -->
  <rect x="620" y="232" width="220" height="22" rx="3" fill="#f55" opacity="0.08"/>
  <text x="730" y="247" text-anchor="middle" fill="#f55" font-size="9">CPU fallback if GPU unavailable</text>

  <!-- axum Server -->
  <rect x="600" y="280" width="260" height="150" rx="5" fill="#1a1a1a" stroke="#0a8" stroke-width="1.2"/>
  <text x="730" y="300" text-anchor="middle" fill="#0a8" font-size="13" font-weight="bold">axum HTTP Server</text>
  <text x="730" y="316" text-anchor="middle" fill="#888" font-size="10">0.0.0.0:3030</text>

  <rect x="615" y="326" width="110" height="24" rx="3" fill="#0a8" opacity="0.1" stroke="#0a8" stroke-width="0.5"/>
  <text x="670" y="342" text-anchor="middle" fill="#0a8" font-size="9">GET / (static)</text>

  <rect x="735" y="326" width="110" height="24" rx="3" fill="#0a8" opacity="0.1" stroke="#0a8" stroke-width="0.5"/>
  <text x="790" y="342" text-anchor="middle" fill="#0a8" font-size="9">WS /ws (live)</text>

  <rect x="615" y="358" width="110" height="24" rx="3" fill="#0a8" opacity="0.1" stroke="#0a8" stroke-width="0.5"/>
  <text x="670" y="374" text-anchor="middle" fill="#0a8" font-size="9">GET /logs (JSON)</text>

  <text x="730" y="406" text-anchor="middle" fill="#555" font-size="9">broadcast channel (16 subs)</text>
  <text x="730" y="420" text-anchor="middle" fill="#555" font-size="9">State | Graph | Log messages</text>

  <!-- ==================== BROWSER BOX ==================== -->
  <rect x="220" y="470" width="660" height="130" rx="6" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="230" y="488" fill="#666" font-size="9" letter-spacing="2">BROWSER DASHBOARD (localhost:3030)</text>

  <!-- Browser panels -->
  <rect x="240" y="498" width="140" height="80" rx="5" fill="#1a1a1a" stroke="#0f8" stroke-width="0.8"/>
  <text x="310" y="518" text-anchor="middle" fill="#0f8" font-size="11" font-weight="bold">Game Canvas</text>
  <text x="310" y="534" text-anchor="middle" fill="#777" font-size="9">20x20 grid</text>
  <text x="310" y="548" text-anchor="middle" fill="#777" font-size="9">Snake + Food</text>
  <text x="310" y="562" text-anchor="middle" fill="#777" font-size="9">Death animation</text>

  <rect x="400" y="498" width="140" height="80" rx="5" fill="#1a1a1a" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="470" y="518" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">Neural Net Viz</text>
  <text x="470" y="534" text-anchor="middle" fill="#777" font-size="9">24-16-16-4 topology</text>
  <text x="470" y="548" text-anchor="middle" fill="#777" font-size="9">Weight colors</text>
  <text x="470" y="562" text-anchor="middle" fill="#777" font-size="9">Active neurons</text>

  <rect x="560" y="498" width="140" height="80" rx="5" fill="#1a1a1a" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="630" y="518" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="bold">Fitness Graph</text>
  <text x="630" y="534" text-anchor="middle" fill="#777" font-size="9">Best score / gen</text>
  <text x="630" y="548" text-anchor="middle" fill="#777" font-size="9">Real-time updates</text>

  <rect x="720" y="498" width="140" height="80" rx="5" fill="#1a1a1a" stroke="#f80" stroke-width="0.8"/>
  <text x="790" y="518" text-anchor="middle" fill="#f80" font-size="11" font-weight="bold">Controls + Log</text>
  <text x="790" y="534" text-anchor="middle" fill="#777" font-size="9">Start / Pause</text>
  <text x="790" y="548" text-anchor="middle" fill="#777" font-size="9">Speed slider</text>
  <text x="790" y="562" text-anchor="middle" fill="#777" font-size="9">Color-coded logs</text>

  <!-- ==================== ARROWS ==================== -->

  <!-- SharedState <-> Sim Loop -->
  <line x1="235" y1="217" x2="320" y2="180" stroke="#f80" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="320" y1="200" x2="235" y2="217" stroke="#f80" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <text x="270" y="190" fill="#f80" font-size="7" text-anchor="middle" opacity="0.7">Arc&lt;Mutex&gt;</text>

  <!-- GUI -> Sim Loop (commands) -->
  <line x1="250" y1="155" x2="320" y2="155" stroke="#a78bfa" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <text x="285" y="148" fill="#a78bfa" font-size="7" text-anchor="middle" opacity="0.7">mpsc cmds</text>

  <!-- Sim Loop <-> GPU -->
  <line x1="560" y1="178" x2="600" y2="165" stroke="#48f" stroke-width="1.2" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <line x1="600" y1="185" x2="560" y2="195" stroke="#48f" stroke-width="1.2" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <text x="583" y="165" fill="#48f" font-size="7" text-anchor="middle" opacity="0.8">buffers</text>

  <!-- Sim Loop -> axum (broadcast) -->
  <line x1="520" y1="300" x2="600" y2="340" stroke="#0a8" stroke-width="1" marker-end="url(#arrow-green)" opacity="0.6"/>
  <text x="545" y="310" fill="#0a8" font-size="7" opacity="0.7">broadcast</text>

  <!-- axum -> Browser (WebSocket) -->
  <line x1="730" y1="430" x2="630" y2="498" stroke="#0a8" stroke-width="1.2" marker-end="url(#arrow-green)" opacity="0.6"/>
  <text x="700" y="466" fill="#0a8" font-size="8" opacity="0.7">WebSocket</text>

  <!-- Browser -> axum (commands) -->
  <line x1="790" y1="498" x2="790" y2="430" stroke="#888" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="810" y="466" fill="#888" font-size="7" opacity="0.6">commands</text>

  <!-- ==================== NEURAL NET DIAGRAM ==================== -->
  <rect x="320" y="320" width="240" height="110" rx="5" fill="#1a1a1a" stroke="#333" stroke-width="0.8"/>
  <text x="440" y="338" text-anchor="middle" fill="#888" font-size="9" letter-spacing="1">NEURAL NETWORK (per snake)</text>

  <!-- Input layer dots -->
  <g fill="#0f8" opacity="0.7">
    <circle cx="345" cy="360" r="2.5"/><circle cx="345" cy="367" r="2.5"/><circle cx="345" cy="374" r="2.5"/>
    <circle cx="345" cy="381" r="2.5"/><circle cx="345" cy="388" r="2.5"/><circle cx="345" cy="395" r="2.5"/>
    <text x="345" y="413" text-anchor="middle" font-size="7" fill="#0f8">24 in</text>
  </g>

  <!-- Hidden 1 dots -->
  <g fill="#48f" opacity="0.7">
    <circle cx="405" cy="363" r="2.5"/><circle cx="405" cy="370" r="2.5"/><circle cx="405" cy="377" r="2.5"/>
    <circle cx="405" cy="384" r="2.5"/><circle cx="405" cy="391" r="2.5"/>
    <text x="405" y="413" text-anchor="middle" font-size="7" fill="#48f">16</text>
  </g>

  <!-- Hidden 2 dots -->
  <g fill="#48f" opacity="0.7">
    <circle cx="465" cy="363" r="2.5"/><circle cx="465" cy="370" r="2.5"/><circle cx="465" cy="377" r="2.5"/>
    <circle cx="465" cy="384" r="2.5"/><circle cx="465" cy="391" r="2.5"/>
    <text x="465" y="413" text-anchor="middle" font-size="7" fill="#48f">16</text>
  </g>

  <!-- Output layer dots -->
  <g fill="#f80" opacity="0.7">
    <circle cx="525" cy="370" r="3"/><circle cx="525" cy="380" r="3"/><circle cx="525" cy="390" r="3"/><circle cx="525" cy="400" r="3"/>
    <text x="525" y="413" text-anchor="middle" font-size="7" fill="#f80">4 out</text>
  </g>

  <!-- Connections (simplified) -->
  <g stroke="#333" stroke-width="0.3" opacity="0.4">
    <line x1="348" y1="367" x2="402" y2="370"/>
    <line x1="348" y1="374" x2="402" y2="377"/>
    <line x1="348" y1="381" x2="402" y2="384"/>
    <line x1="348" y1="388" x2="402" y2="377"/>
    <line x1="348" y1="360" x2="402" y2="363"/>
    <line x1="408" y1="370" x2="462" y2="370"/>
    <line x1="408" y1="377" x2="462" y2="377"/>
    <line x1="408" y1="384" x2="462" y2="384"/>
    <line x1="408" y1="363" x2="462" y2="370"/>
    <line x1="408" y1="391" x2="462" y2="384"/>
    <line x1="468" y1="370" x2="522" y2="375"/>
    <line x1="468" y1="377" x2="522" y2="385"/>
    <line x1="468" y1="384" x2="522" y2="395"/>
    <line x1="468" y1="391" x2="522" y2="400"/>
  </g>

  <!-- Labels for output -->
  <text x="538" y="373" fill="#f80" font-size="7" opacity="0.8">U</text>
  <text x="538" y="383" fill="#f80" font-size="7" opacity="0.8">D</text>
  <text x="538" y="393" fill="#f80" font-size="7" opacity="0.8">L</text>
  <text x="538" y="403" fill="#f80" font-size="7" opacity="0.8">R</text>

  <text x="440" y="425" text-anchor="middle" fill="#555" font-size="8">740 parameters | sigmoid activation</text>

  <!-- ==================== CHECKPOINT ==================== -->
  <rect x="20" y="280" width="250" height="50" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="0.8"/>
  <text x="145" y="300" text-anchor="middle" fill="#888" font-size="11">checkpoint.json</text>
  <text x="145" y="316" text-anchor="middle" fill="#555" font-size="9">2000 brains + scores (auto-save)</text>

  <!-- Sim -> Checkpoint -->
  <line x1="320" y1="270" x2="270" y2="290" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="305" y="275" fill="#888" font-size="7" opacity="0.6">every 10 gen</text>

  <!-- ==================== GENETIC ALGORITHM FLOW ==================== -->
  <rect x="20" y="350" width="250" height="100" rx="5" fill="#1a1a1a" stroke="#f55" stroke-width="0.8"/>
  <text x="145" y="370" text-anchor="middle" fill="#f55" font-size="11" font-weight="bold">Genetic Algorithm</text>
  <text x="145" y="390" text-anchor="middle" fill="#777" font-size="9">Fitness: lifetime^2 * 2^score</text>
  <text x="145" y="406" text-anchor="middle" fill="#777" font-size="9">Roulette wheel selection</text>
  <text x="145" y="422" text-anchor="middle" fill="#777" font-size="9">Crossover + 5% mutation</text>
  <text x="145" y="438" text-anchor="middle" fill="#777" font-size="9">Elitism: best brain preserved</text>

  <!-- GA <-> Sim -->
  <line x1="270" y1="380" x2="320" y2="250" stroke="#f55" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.4"/>

  <!-- Footer -->
  <text x="450" y="612" text-anchor="middle" fill="#333" font-size="9">2000 snakes/gen  |  20x20 grid  |  ~0.5ms GPU inference  |  scores 30+ in 20-50 gens</text>
</svg>
